name: "\U0001F9EA CI \u81ea\u52d5\u5316\u6e2c\u8a66 (API \u2192 iOS & Android)"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  # \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
  # Stage 1\uff1aAPI \u6e2c\u8a66\uff08.NET 8\uff09
  # \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
  test-api:
    name: "\U0001F535 Stage 1 \u2014 API \u6e2c\u8a66 (.NET 8)"
    runs-on: ubuntu-latest
    outputs:
      api-passed: ${{ steps.api-result.outputs.passed }}
    steps:
      - name: "\u53d6\u5f97\u7a0b\u5f0f\u78bc"
        uses: actions/checkout@v4

      - name: "\u8a2d\u5b9a .NET 8 \u74b0\u5883"
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: "\u9084\u539f\u76f8\u4f9d\u5957\u4ef6\uff08API \u4e3b\u5c08\u6848\uff09"
        working-directory: ./api/VegettableApi
        run: dotnet restore

      - name: "\u9084\u539f\u76f8\u4f9d\u5957\u4ef6\uff08Tests \u5c08\u6848\uff09"
        working-directory: ./api/VegettableApi.Tests
        run: dotnet restore

      - name: "\u5efa\u7f6e API \u5c08\u6848"
        working-directory: ./api/VegettableApi
        run: dotnet build --no-restore --configuration Release

      - name: "\u5efa\u7f6e Tests \u5c08\u6848"
        working-directory: ./api/VegettableApi.Tests
        run: dotnet build --no-restore --configuration Release

      - name: "\u57f0\u884c C# \u55ae\u5143\u6e2c\u8a66"
        id: csharp-test
        working-directory: ./api/VegettableApi.Tests
        run: |
          dotnet test --no-build --configuration Release \
            --verbosity normal \
            --logger "trx;LogFileName=test-results.trx" \
            --results-directory ./TestResults \
          || echo "CSHARP_TEST_FAILED=true" >> $GITHUB_ENV

      - name: "\u57f0\u884c API Contract \u6e2c\u8a66\uff08\u975c\u614b\u5206\u6790\uff09"
        id: contract-test
        run: node tests/api-contract-test.js || echo "CONTRACT_TEST_FAILED=true" >> $GITHUB_ENV

      - name: "\u81ea\u52d5\u4fee\u5fa9\uff1aC# \u6e2c\u8a66\u5931\u6557 \u2014 \u6e05\u9664\u5feb\u53d6\u5f8c\u91cd\u8a66"
        if: env.CSHARP_TEST_FAILED == 'true'
        working-directory: ./api/VegettableApi.Tests
        run: |
          echo "\u26a0\ufe0f C# \u55ae\u5143\u6e2c\u8a66\u5931\u6557\uff0c\u6e05\u9664 build cache \u5f8c\u91cd\u8a66..."
          dotnet clean
          dotnet restore --force
          dotnet build --configuration Release
          dotnet test --no-build --configuration Release --verbosity normal \
          && echo "CSHARP_TEST_FAILED=" >> $GITHUB_ENV \
          || echo "CSHARP_TEST_RETRY_FAILED=true" >> $GITHUB_ENV

      - name: "\u81ea\u52d5\u4fee\u5fa9\uff1aContract \u6e2c\u8a66\u5931\u6557 \u2014 \u91cd\u8a66"
        if: env.CONTRACT_TEST_FAILED == 'true'
        run: |
          echo "\u26a0\ufe0f Contract \u6e2c\u8a66\u5931\u6557\uff0c\u91cd\u8a66..."
          node tests/api-contract-test.js \
          && echo "CONTRACT_TEST_FAILED=" >> $GITHUB_ENV \
          || echo "CONTRACT_TEST_RETRY_FAILED=true" >> $GITHUB_ENV

      - name: "\u8a18\u9304 API \u6e2c\u8a66\u7d50\u679c"
        id: api-result
        run: |
          if [ "$CSHARP_TEST_RETRY_FAILED" = "true" ] || [ "$CONTRACT_TEST_RETRY_FAILED" = "true" ]; then
            echo "passed=false" >> $GITHUB_OUTPUT
            echo "::error::API \u6e2c\u8a66\u6700\u7d42\u672a\u901a\u904e\uff0c\u8acb\u6aa2\u67e5\u4e0a\u65b9\u65e5\u8a8c"
          else
            echo "passed=true" >> $GITHUB_OUTPUT
            echo "\u2705 API \u6240\u6709\u6e2c\u8a66\u901a\u904e\uff01"
          fi

      - name: "\u4e0a\u50b3\u6e2c\u8a66\u7d50\u679c"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-results
          path: api/VegettableApi.Tests/TestResults/
          if-no-files-found: ignore

      - name: "\u5beb\u5165 Job Summary"
        if: always()
        run: |
          echo "## \U0001F535 API \u6e2c\u8a66\u7d50\u679c" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| \u9805\u76ee | \u72c0\u614b |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          if [ "$CSHARP_TEST_RETRY_FAILED" = "true" ]; then
            echo "| C# \u55ae\u5143\u6e2c\u8a66 | \u274c \u5931\u6557 |" >> $GITHUB_STEP_SUMMARY
          elif [ "$CSHARP_TEST_FAILED" = "true" ]; then
            echo "| C# \u55ae\u5143\u6e2c\u8a66 | \u26a0\ufe0f \u91cd\u8a66\u5f8c\u901a\u904e |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| C# \u55ae\u5143\u6e2c\u8a66 | \u2705 \u901a\u904e |" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "$CONTRACT_TEST_RETRY_FAILED" = "true" ]; then
            echo "| Contract \u6e2c\u8a66 | \u274c \u5931\u6557 |" >> $GITHUB_STEP_SUMMARY
          elif [ "$CONTRACT_TEST_FAILED" = "true" ]; then
            echo "| Contract \u6e2c\u8a66 | \u26a0\ufe0f \u91cd\u8a66\u5f8c\u901a\u904e |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Contract \u6e2c\u8a66 | \u2705 \u901a\u904e |" >> $GITHUB_STEP_SUMMARY
          fi

  # \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
  # Stage 2a\uff1aAndroid \u6e2c\u8a66
  # \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
  test-android:
    name: "\U0001F916 Stage 2 \u2014 Android \u6e2c\u8a66"
    runs-on: ubuntu-latest
    needs: test-api
    if: needs.test-api.outputs.api-passed == 'true'
    steps:
      - name: "\u53d6\u5f97\u7a0b\u5f0f\u78bc"
        uses: actions/checkout@v4

      - name: "\u8a2d\u5b9a Java JDK 17"
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: "\u8ce6\u4e88 Gradle \u57f3\u884c\u6b0a\u9650"
        working-directory: ./android
        run: chmod +x ./gradlew

      - name: "\u5efa\u7f6e Debug APK"
        id: android-build
        working-directory: ./android
        run: |
          ./gradlew assembleDebug --stacktrace \
          || echo "ANDROID_BUILD_FAILED=true" >> $GITHUB_ENV

      - name: "\u81ea\u52d5\u4fee\u5fa9\uff1aAndroid \u5efa\u7f6e\u5931\u6557 \u2014 \u6e05\u9664\u5feb\u53d6\u5f8c\u91cd\u8a66"
        if: env.ANDROID_BUILD_FAILED == 'true'
        working-directory: ./android
        run: |
          echo "\u26a0\ufe0f Android \u5efa\u7f6e\u5931\u6557\uff0c\u6e05\u9664 Gradle \u5feb\u53d6\u5f8c\u91cd\u8a66..."
          ./gradlew clean
          ./gradlew --stop
          ./gradlew assembleDebug --stacktrace --refresh-dependencies

      - name: "\u57f8\u884c Android \u55ae\u5143\u6e2c\u8a66"
        id: android-unit-test
        working-directory: ./android
        run: |
          ./gradlew testDebugUnitTest --stacktrace --continue \
            2>&1 | tee android-test-output.txt
          if grep -q "BUILD FAILED\|FAILURE:" android-test-output.txt; then
            echo "ANDROID_TEST_FAILED=true" >> $GITHUB_ENV
          fi

      - name: "\u81ea\u52d5\u4fee\u5fa9\uff1aAndroid \u6e2c\u8a66\u5931\u6557 \u2014 \u6e05\u9664\u5feb\u53d6\u5f8c\u91cd\u8a66"
        if: env.ANDROID_TEST_FAILED == 'true'
        working-directory: ./android
        run: |
          echo "\u26a0\ufe0f Android \u6e2c\u8a66\u5931\u6557\uff0c\u5206\u6790\u932f\u8aa4..."
          grep -A 5 "FAILED\|Error\|Exception" android-test-output.txt | head -50 || true
          echo "\U0001F504 \u6e05\u9664\u6e2c\u8a66\u5feb\u53d6\u5f8c\u91cd\u8a66..."
          ./gradlew cleanTestDebugUnitTest
          ./gradlew testDebugUnitTest --stacktrace --rerun-tasks \
            2>&1 | tee android-retry-output.txt
          if grep -q "BUILD FAILED\|FAILURE:" android-retry-output.txt; then
            echo "ANDROID_TEST_RETRY_FAILED=true" >> $GITHUB_ENV
          else
            echo "\u2705 Android \u6e2c\u8a66\u91cd\u8a66\u5f8c\u901a\u904e\uff01"
          fi

      - name: "\u6536\u96c6 Android \u6e2c\u8a66\u5831\u544a"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-test-reports
          path: |
            android/app/build/reports/tests/
            android/app/build/test-results/
          if-no-files-found: ignore

      - name: "\u5beb\u5165 Android Job Summary"
        if: always()
        run: |
          echo "## \U0001F916 Android \u6e2c\u8a66\u7d50\u679c" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| \u9805\u76ee | \u72c0\u614b |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          if [ "$ANDROID_TEST_RETRY_FAILED" = "true" ]; then
            echo "| Gradle Build | \u274c \u5931\u6557 |" >> $GITHUB_STEP_SUMMARY
            echo "| \u55ae\u5143\u6e2c\u8a66 | \u274c \u91cd\u8a66\u5f8c\u4ecd\u672a\901a\904e |" >> $GITHUB_STEP_SUMMARY
          elif [ "$ANDROID_TEST_FAILED" = "true" ]; then
            echo "| Gradle Build | \u2705 \u901a\u904e |" >> $GITHUB_STEP_SUMMARY
            echo "| \u55ae\u5143\u6e2c\u8a66 | \u26a0\ufe0f \u91cd\u8a66\u5f8c\u901a\u904e |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Gradle Build | \u2705 \u901a\u904e |" >> $GITHUB_STEP_SUMMARY
            echo "| \u55ae\u5143\u6e2c\u8a66 | \u2705 \u901a\u904e |" >> $GITHUB_STEP_SUMMARY
          fi

      - name: "\u6700\u7d42\u5224\u5b9a"
        if: env.ANDROID_TEST_RETRY_FAILED == 'true'
        run: |
          echo "::error::Android \u6e2c\u8a66\u6700\u7d42\u5931\u6557\uff0c\u8acb\u67e5\u770b\u6e2c\u8a66\u5831\u544a"
          exit 1

  # \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
  # Stage 2b\uff1aiOS \u6e2c\u8a66
  # \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
  test-ios:
    name: "\U0001F34E Stage 2 \u2014 iOS \u6e2c\u8a66 (Swift Package)"
    runs-on: macos-15
    needs: test-api
    if: needs.test-api.outputs.api-passed == 'true'
    steps:
      - name: "\u53d6\u5f97\u7a0b\u5f0f\u78bc"
        uses: actions/checkout@v4

      - name: "\u9078\u64c7 Xcode 16.2"
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: "\u57f8\u884c iOS Swift Package \u55ae\u5143\u6e2c\u8a66"
        id: ios-test
        working-directory: ./ios/VegettableTests
        run: |
          swift test --verbose \
            2>&1 | tee ios-test-output.txt \
          || echo "IOS_TEST_FAILED=true" >> $GITHUB_ENV

      - name: "\u81ea\u52d5\u4fee\u5fa9\uff1aiOS \u6e2c\u8a66\u5931\u6557 \u2014 \u6e05\u9664\u5efa\u7f6e\u5feb\u53d6\u5f8c\u91cd\u8a66"
        if: env.IOS_TEST_FAILED == 'true'
        working-directory: ./ios/VegettableTests
        run: |
          echo "\u26a0\ufe0f iOS \u6e2c\u8a66\u5931\u6557\uff0c\u5206\u6790\u932f\u8aa4..."
          grep -E "error:|FAILED|failed" ios-test-output.txt | head -30 || true
          echo "\U0001F504 \u6e05\u9664\u5efa\u7f6e\u7522\u7269\u5f8c\u91cd\u8a66..."
          rm -rf .build
          swift test --verbose \
            2>&1 | tee ios-retry-output.txt \
          && echo "\u2705 iOS \u6e2c\u8a66\u91cd\u8a66\u5f8c\u901a\u904e\uff01" \
          || echo "IOS_TEST_RETRY_FAILED=true" >> $GITHUB_ENV

      - name: "\u6536\u96c6 iOS \u6e2c\u8a66\u7d50\u679c"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-test-results
          path: |
            ios/VegettableTests/ios-test-output.txt
          if-no-files-found: ignore

      - name: "\u5beb\u5165 iOS Job Summary"
        if: always()
        run: |
          echo "## \U0001F34E iOS \u6e2c\u8a66\u7d50\u679c" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| \u9805\u76ee | \u72c0\u614b |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          if [ "$IOS_TEST_RETRY_FAILED" = "true" ]; then
            echo "| Swift Package Build | \u274c \u5931\u6557 |" >> $GITHUB_STEP_SUMMARY
            echo "| XCTest \u55ae\u5143\u6e2c\u8a66 | \u274c \u91cd\u8a66\u5f8c\u4ecd\u672a\u901a\u904e |" >> $GITHUB_STEP_SUMMARY
          elif [ "$IOS_TEST_FAILED" = "true" ]; then
            echo "| Swift Package Build | \u2705 \u901a\u904e |" >> $GITHUB_STEP_SUMMARY
            echo "| XCTest \u55ae\u5143\u6e2c\u8a66 | \u26a0\ufe0f \u91cd\u8a66\u5f8c\u901a\u904e |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Swift Package Build | \u2705 \u901a\u904e |" >> $GITHUB_STEP_SUMMARY
            echo "| XCTest \u55ae\u5143\u6e2c\u8a66 | \u2705 \u901a\u904e |" >> $GITHUB_STEP_SUMMARY
          fi

      - name: "\u6700\u7d42\u5224\u5b9a"
        if: env.IOS_TEST_RETRY_FAILED == 'true'
        run: |
          echo "::error::iOS \u6e2c\u8a66\u6700\u7d42\u5931\u6557\uff0c\u8acb\u67e5\u770b\u6e2c\u8a66\u8f38\u51fa"
          exit 1

  # \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
  # \u6700\u7d42\u6574\u5408\u5831\u544a
  # \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
  summary:
    name: "\U0001F4CB \u6e2c\u8a66\u6574\u5408\u5831\u544a"
    runs-on: ubuntu-latest
    needs: [test-api, test-android, test-ios]
    if: always()
    steps:
      - name: "\u8f38\u51fa\u6574\u9ad4\u7d50\u679c"
        run: |
          echo "## \U0001F4CB CI \u6574\u9ad4\u6e2c\u8a66\u7d50\u679c" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| \u6e2c\u8a66\u968e\u6bb5 | \u7d50\u679c |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|------|" >> $GITHUB_STEP_SUMMARY

          API_RESULT="${{ needs.test-api.result }}"
          ANDROID_RESULT="${{ needs.test-android.result }}"
          IOS_RESULT="${{ needs.test-ios.result }}"

          [ "$API_RESULT" = "success" ]     && API_ICON="\u2705"     || API_ICON="\u274c"
          [ "$ANDROID_RESULT" = "success" ] && ANDROID_ICON="\u2705" || { [ "$ANDROID_RESULT" = "skipped" ] && ANDROID_ICON="\u23ed\ufe0f" || ANDROID_ICON="\u274c"; }
          [ "$IOS_RESULT" = "success" ]     && IOS_ICON="\u2705"     || { [ "$IOS_RESULT" = "skipped" ] && IOS_ICON="\u23ed\ufe0f" || IOS_ICON="\u274c"; }

          echo "| \U0001F535 API (.NET 8) | $API_ICON $API_RESULT |" >> $GITHUB_STEP_SUMMARY
          echo "| \U0001F916 Android     | $ANDROID_ICON $ANDROID_RESULT |" >> $GITHUB_STEP_SUMMARY
          echo "| \U0001F34E iOS         | $IOS_ICON $IOS_RESULT |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "$API_RESULT" = "success" ] && [ "$ANDROID_RESULT" = "success" ] && [ "$IOS_RESULT" = "success" ]; then
            echo "\U0001F389 **\u6240\u6709\u6e2c\u8a66\u901a\u904e\uff01**" >> $GITHUB_STEP_SUMMARY
