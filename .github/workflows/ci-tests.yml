name: CI Automated Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ----------------------------------------
  # 1. 測試 C# API
  # ----------------------------------------
  test-csharp-api:
    name: Test C# API
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./api/VegettableApi
    steps:
      - name: 取得程式碼
        uses: actions/checkout@v4

      - name: 設定 .NET 8 環境
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: 還原相依套件
        run: dotnet restore

      - name: 建置專案
        run: dotnet build --no-restore

      - name: 執行 C# 測試
        run: dotnet test --no-build --verbosity normal

  # ----------------------------------------
  # 2. 測試 Android App
  # ----------------------------------------
  test-android:
    name: Test Android App
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./android
    steps:
      - name: 取得程式碼
        uses: actions/checkout@v4

      - name: 設定 Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17' 

      - name: 賦予 Gradle 執行權限
        run: chmod +x ./gradlew

      - name: 執行 Android 單元測試
        run: ./gradlew testDebugUnitTest

  # ----------------------------------------
  # 3. 測試 iOS App
  # ----------------------------------------
  test-ios:
    name: Test iOS App
    runs-on: macos-latest
    defaults:
      run:
        working-directory: ./ios
    steps:
      - name: 取得程式碼
        uses: actions/checkout@v4

      - name: 選擇穩定的 Xcode 版本
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: 執行 iOS 測試
        # 預設使用 Vegettable 作為 Scheme 名稱，並在 iPhone 15 模擬器上測試
        run: |
          xcodebuild test \
            -project Vegettable.xcodeproj \
            -scheme VegettableApp \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest'
