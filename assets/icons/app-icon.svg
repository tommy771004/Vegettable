<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- 主要綠色漸層背景 -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#43A047"/>
      <stop offset="50%" stop-color="#2E7D32"/>
      <stop offset="100%" stop-color="#1B5E20"/>
    </linearGradient>

    <!-- 指數折線的光澤 -->
    <linearGradient id="lineGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#A5D6A7"/>
      <stop offset="100%" stop-color="#E8F5E9"/>
    </linearGradient>

    <!-- 面積填充 -->
    <linearGradient id="areaFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A5D6A7" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#2E7D32" stop-opacity="0.05"/>
    </linearGradient>

    <!-- 圖示陰影 -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- 圓角矩形背景 -->
  <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224" fill="url(#bgGrad)"/>

  <!-- 裝飾性光暈圓 -->
  <circle cx="280" cy="280" r="300" fill="white" opacity="0.04"/>
  <circle cx="750" cy="750" r="250" fill="white" opacity="0.03"/>

  <!-- 指數圖表面積填充 -->
  <path d="M160 750 L260 680 L360 700 L460 580 L560 520 L660 400 L760 350 L860 280 L860 750 Z"
        fill="url(#areaFill)"/>

  <!-- 指數折線 (向上趨勢) -->
  <polyline points="160,750 260,680 360,700 460,580 560,520 660,400 760,350 860,280"
            fill="none" stroke="url(#lineGlow)" stroke-width="14"
            stroke-linecap="round" stroke-linejoin="round"
            filter="url(#shadow)"/>

  <!-- 折線數據點 -->
  <circle cx="160" cy="750" r="10" fill="#E8F5E9"/>
  <circle cx="260" cy="680" r="10" fill="#E8F5E9"/>
  <circle cx="360" cy="700" r="10" fill="#E8F5E9"/>
  <circle cx="460" cy="580" r="12" fill="#E8F5E9"/>
  <circle cx="560" cy="520" r="12" fill="#E8F5E9"/>
  <circle cx="660" cy="400" r="12" fill="#E8F5E9"/>
  <circle cx="760" cy="350" r="14" fill="#E8F5E9"/>
  <circle cx="860" cy="280" r="16" fill="white"/>

  <!-- 箭頭 (向上趨勢指標) -->
  <g transform="translate(820, 200)" filter="url(#shadow)">
    <polygon points="40,0 80,50 60,50 60,90 20,90 20,50 0,50"
             fill="white" opacity="0.9"/>
  </g>

  <!-- 蔬菜葉子圖示 -->
  <g transform="translate(130, 150)" filter="url(#shadow)">
    <path d="M60 120 C60 120 20 80 30 40 C35 20 55 10 70 20 C85 10 105 20 110 40 C120 80 80 120 80 120 L70 140 L60 120Z"
          fill="white" opacity="0.85"/>
    <path d="M70 40 L70 120" stroke="#43A047" stroke-width="3" opacity="0.5"/>
    <path d="M70 60 L50 50" stroke="#43A047" stroke-width="2" opacity="0.4"/>
    <path d="M70 80 L90 65" stroke="#43A047" stroke-width="2" opacity="0.4"/>
  </g>
</svg>
